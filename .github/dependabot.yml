version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      # Group all non-Next.js dependency updates together to reduce PR noise.
      # Next.js is kept separate because major/minor bumps need manual review.
      dependencies:
        patterns: ["*"]
        exclude-patterns: ["next"]
      next:
        patterns: ["next"]
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
